name = "bailly-group"
main = "functions/index.ts"
compatibility_date = "2024-01-01"
node_compat = true

[env.production]
routes = [
  { pattern = "example.com/api/*", zone_name = "example.com" }
]

[build]
command = "npm run build"
cwd = "."

[build.upload]
format = "modules"
main = "./functions/index.ts"
